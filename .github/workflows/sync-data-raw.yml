name: Sync DATA_RAW to Supabase

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: data-raw-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sync dependencies
        run: pip install -r requirements-sync.txt

      - name: Sync DATA_RAW
        env:
          CRM_SUPABASE_URL: ${{ secrets.CRM_SUPABASE_URL }}
          CRM_SUPABASE_SERVICE_KEY: ${{ secrets.CRM_SUPABASE_SERVICE_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SYNC_TRIGGER_TYPE: github_actions
        run: python sync_data_raw_to_supabase.py
