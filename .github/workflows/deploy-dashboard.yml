name: Deploy Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dashboard dependencies
        run: pip install -r requirements.txt

      - name: Validate dashboard syntax
        run: python -m py_compile app.py auth_utils.py customer360.py crm_dashboard.py pages/3_sync_status.py sync_crm_customers_to_supabase.py
