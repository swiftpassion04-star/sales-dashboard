name: Sync DATA_RAW to Supabase

on:
  schedule:
    # 00:00 Asia/Bangkok. GitHub Actions cron uses UTC.
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      batch_size:
        description: "DATA_RAW upsert batch size. Lower is gentler for Supabase Free Plan."
        required: false
        default: "100"
      min_batch_size:
        description: "Smallest retry split batch size."
        required: false
        default: "20"

concurrency:
  group: data-raw-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sync dependencies
        run: pip install -r requirements-sync.txt

      - name: Sync DATA_RAW
        env:
          CRM_SUPABASE_URL: ${{ secrets.CRM_SUPABASE_URL }}
          CRM_SUPABASE_SERVICE_KEY: ${{ secrets.CRM_SUPABASE_SERVICE_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SYNC_TRIGGER_TYPE: github_actions
          DATA_RAW_BATCH_SIZE: ${{ github.event.inputs.batch_size || '100' }}
          DATA_RAW_MIN_BATCH_SIZE: ${{ github.event.inputs.min_batch_size || '20' }}
          DATA_RAW_MAX_UPSERT_RETRIES: "3"
          DATA_RAW_RETRY_SLEEP_SECONDS: "2"
        run: python sync_data_raw_to_supabase.py
