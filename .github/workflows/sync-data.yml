name: Sync DATA_RAW to Supabase

on:
  # Legacy DATA_RAW sync is manual-only. Use the Streamlit Excel Upload page for curated imports.
  workflow_dispatch:
    inputs:
      batch_size:
        description: "DATA_RAW upsert batch size. Lower is gentler for Supabase Free Plan."
        required: false
        default: "100"
      min_batch_size:
        description: "Smallest retry split batch size."
        required: false
        default: "20"

concurrency:
  group: data-raw-sync
  cancel-in-progress: false

jobs:
  disabled:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Legacy workflow disabled
        run: echo "Legacy DATA_RAW sync is disabled because order_history was replaced by crm_data_imports Excel import."
